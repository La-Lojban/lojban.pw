name: Lighthouse CI

# Runs Lighthouse against the live production site (https://lojban.pw) after
# each successful deploy of `CI/CD with Docker`, nightly, and on manual
# dispatch. Measures real network / GitHub Pages edge perf — not a localhost
# preview.
#
# URL source: https://lojban.pw/sitemap.xml (published by the deploy job via
# scripts/generate-sitemap.js). Every `<loc>` is audited — no sampling, no
# synthesised URLs. Auditing anything outside the sitemap caused 404s that
# aborted `lhci collect` for the whole matrix cell.
#
# Outputs (ranked by utility):
#   1. $GITHUB_STEP_SUMMARY — Markdown table with Core Web Vitals per URL,
#      visible on the workflow run page.
#   2. Artifact `lighthouse-reports-<preset>-<run>` — full HTML reports,
#      30d retention.
#   3. temporary-public-storage URLs — shareable report links (7d expiry),
#      linked from the step summary.
#
# Assertions are `warn`, never `error` — this workflow is diagnostic and
# never fails the deploy. Tighten to `error` in .lighthouserc.cjs once
# budgets are stable.

on:
  workflow_run:
    workflows: ['CI/CD with Docker']
    types: [completed]
  schedule:
    # 03:00 UTC daily — catches regressions from GH Pages edge / 3rd-party
    # script changes that happen independently of our deploys.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      urls:
        description: 'Comma-separated URLs to audit (overrides sitemap fetch)'
        required: false
        default: ''
      runs:
        description: 'Lighthouse runs per URL'
        required: false
        default: '1'

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lighthouse:
    # Skip if the upstream deploy workflow failed — no point auditing a stale
    # site. Scheduled and manual runs always proceed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # Sitemap has ~380 URLs × 2 presets = ~760 Lighthouse runs worst case;
    # each takes ~15-20s. Default 6h job timeout is enough, but bump matrix
    # parallelism via preset only.
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        preset: [mobile, desktop]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Resolve URL list
        id: urls
        env:
          BASE_URL: https://lojban.pw
          INPUT_URLS: ${{ github.event.inputs.urls }}
        run: |
          # Prefer explicit workflow_dispatch override. Otherwise fetch the
          # full sitemap and emit every `<loc>`. The sitemap is generated by
          # scripts/generate-sitemap.js during the `CI/CD with Docker` build,
          # so its contents are guaranteed to resolve on the live site.
          if [ -n "$INPUT_URLS" ]; then
            printf '%s\n' "$INPUT_URLS" | tr ',' '\n' | sed '/^$/d' > urls.txt
          else
            node scripts/lighthouse-urls.cjs --base="$BASE_URL" > urls.txt
          fi
          echo "Targets ($(wc -l < urls.txt) URLs):"
          cat urls.txt
          {
            echo 'list<<EOF'
            cat urls.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse (${{ matrix.preset }})
        id: lhci
        # A single 404 (or any other page load error) makes `lhci collect`
        # exit non-zero and fails the step. Continue so the summary + HTML
        # artifact still publish with whatever results did complete.
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.urls.outputs.list }}
          configPath: './.lighthouserc.cjs'
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: ${{ github.event.inputs.runs || '1' }}
        env:
          LHCI_FORM_FACTOR: ${{ matrix.preset }}
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
          LHCI_BUILD_CONTEXT__COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'scheduled run' }}

      - name: Render step summary
        if: always()
        run: node scripts/lighthouse-summary.cjs .lighthouseci "${{ matrix.preset }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ matrix.preset }}-${{ github.run_id }}
          path: |
            .lighthouseci/*.html
            .lighthouseci/manifest.json
            .lighthouseci/links.json
          retention-days: 30
          if-no-files-found: warn
