name: CI/CD with Docker

on:
  schedule:
    - cron: '0 0 */3 * *'  # Run every 3 days at midnight UTC
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]  # Added to run checks on PRs
  workflow_dispatch:  # Allow manual triggering from GitHub Actions UI

# Cancel any in-progress run when a new run of this workflow starts
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  TAG_NAME: ${{ github.sha }}
  DOCKER_BUILDKIT: 1  # Enable BuildKit for faster builds
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 (Node 20 deprecated on runners)
  # CI-only: next.config.js uses min(NEXT_BUILD_MAX_CPUS, os.cpus().length) for static generation.
  NEXT_BUILD_MAX_CPUS: 16

jobs:
  build:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    environment: github-pages  # use env secrets (e.g. Algolia) from this environment

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  # Shallow clone for faster checkout

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      continue-on-error: true
      with:
        path: ${{ github.workspace }}/ms-playwright
        key: ${{ runner.OS }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.OS }}-playwright-
    
    - name: Cache Next.js build
      uses: actions/cache@v4
      id: nextjs-cache
      continue-on-error: true
      with:
        path: ${{ github.workspace }}/src/.next
        key: ${{ runner.OS }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'src/pnpm-lock.yaml', 'src/package.json', 'src/next.config.js', 'src/**/*.js', 'src/**/*.ts', 'src/**/*.tsx', 'src/**/*.json') }}
        restore-keys: |
          ${{ runner.OS }}-nextjs-

    - name: Build Docker image with cache
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: lojban:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
          NODE_ENV=production

    # Site build, then Algolia index push (same markdown as the build). Runs on push to main,
    # cron (every 3 days), and workflow_dispatch. Skipped on pull_request so PRs do not overwrite
    # the live index. Requires ALGOLIA_ADMIN_KEY (+ app id / index name secrets); if unset, the
    # script exits 0 and the build still succeeds.
    - name: Run Docker container (build + Algolia index)
      run: |
        # Build install commands based on cache status
        INSTALL_CMD=""
        # Note: pnpm cache is handled by setup-node action, but we still need to install in Docker
        # The cache helps speed up installs, but we always run install in Docker for consistency
        INSTALL_CMD="pnpm install --frozen-lockfile && "
        if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
          INSTALL_CMD="${INSTALL_CMD}pnpm exec playwright install chromium --with-deps && "
        fi
        INDEX_NAME="${{ secrets.NEXT_PUBLIC_ALGOLIA_INDEX_NAME }}"
        if [ -z "$INDEX_NAME" ]; then INDEX_NAME="lojban-pw"; fi
        docker run --rm -v /output:/app/src/out1 \
                   -v ${{ github.workspace }}/data/config:/app/src/config:Z \
                   -v ${{ github.workspace }}/ms-playwright:/ms-playwright:Z \
                   -v ${{ github.workspace }}/node_modules:/app/src/node_modules:Z \
                   -v ${{ github.workspace }}/data/pages:/app/src/md_pages:Z \
                   -v ${{ github.workspace }}/data/assets:/app/src/public/assets:Z \
                   -v ${{ github.workspace }}/data/DNS:/app/service/DNS:Z \
                   -v ${{ github.workspace }}/src:/app/src:Z \
                   -e GOOGLE_LOJBAN_CORPUS_DOC_ID=${{ secrets.GOOGLE_LOJBAN_CORPUS_DOC_ID }} \
                   -e GOOGLE_READONLY_API_KEY=${{ secrets.GOOGLE_READONLY_API_KEY }} \
                   -e NEXT_PUBLIC_ALGOLIA_APP_ID=${{ secrets.NEXT_PUBLIC_ALGOLIA_APP_ID }} \
                   -e NEXT_PUBLIC_ALGOLIA_SEARCH_KEY=${{ secrets.NEXT_PUBLIC_ALGOLIA_SEARCH_KEY }} \
                   -e NEXT_PUBLIC_ALGOLIA_INDEX_NAME=${{ secrets.NEXT_PUBLIC_ALGOLIA_INDEX_NAME }} \
                   -e ALGOLIA_APP_ID=${{ secrets.NEXT_PUBLIC_ALGOLIA_APP_ID }} \
                   -e ALGOLIA_ADMIN_KEY=${{ secrets.ALGOLIA_ADMIN_KEY }} \
                   -e ALGOLIA_INDEX_NAME="$INDEX_NAME" \
                   -e CI=true \
                   -e NEXT_BUILD_MAX_CPUS="${{ env.NEXT_BUILD_MAX_CPUS }}" \
                   -e PLAYWRIGHT_BROWSERS_PATH=/ms-playwright \
                   lojban:latest \
                   sh -c "${INSTALL_CMD}pnpm cicd && if [ \"${{ github.event_name }}\" != \"pull_request\" ]; then node scripts/algolia-index.js; else echo \"Skipping Algolia index on pull_request\"; fi"

    - name: Fix artifact and cache paths (host ownership for Actions cache)
      run: |
        sudo chown -R "$USER:$USER" /output
        sudo chown -R "$USER:$USER" "${{ github.workspace }}/ms-playwright" 2>/dev/null || true
        sudo chown -R "$USER:$USER" "${{ github.workspace }}/src" 2>/dev/null || true

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: /output/
        retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4